<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="微信聊天记录生成器 - 生成沉浸式的微信对话截图">
    <title>聊天记录 - 文字分享卡片生成器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=ZCOOL+KuaiLe&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="../static/index.css">
</head>
<body>
    <!-- Top Nav -->
    <nav class="top-nav">
        <div class="nav-container">
            <a href="../index.html" class="nav-item">首页</a>
            <a href="card.html" class="nav-item">文字卡片</a>
            <a href="chat.html" class="nav-item active">聊天记录</a>
        </div>
    </nav>

    <!-- Background -->
    <div class="bg-ornament bg-ornament-1"></div>
    <div class="bg-ornament bg-ornament-2"></div>

    <div class="app-container">
        <main class="main-content">
            <!-- ====== 左：输入区 ====== -->
            <section class="input-panel">
                <h2 class="section-title">
                    <span class="section-icon">✎</span>
                    构建对话
                </h2>

                <div class="form-group">
                    <label for="chatTargetName" class="form-label">聊天对象署名</label>
                    <input type="text" id="chatTargetName" class="form-input" placeholder="输入聊天对象的昵称..." value="一只甜薯" maxlength="20">
                </div>

                <div class="form-group" style="margin-top: 30px;">
                    <label for="leftMessage" class="form-label">对方发言（左侧）</label>
                    <textarea id="leftMessage" class="form-textarea" placeholder="输入对方要说的话..." rows="3" style="min-height:80px;"></textarea>
                    <button class="btn-generate" id="addLeftBtn" style="margin-top:10px; background:rgba(255,255,255,0.08); color:var(--text1); box-shadow:none; padding:12px 0; border: 1px solid var(--border);">
                        添加对方发言
                    </button>
                </div>

                <div class="form-group" style="margin-top: 30px;">
                    <label for="rightMessage" class="form-label">自己发言（右侧）</label>
                    <textarea id="rightMessage" class="form-textarea" placeholder="输入你要说的话..." rows="3" style="min-height:80px;"></textarea>
                    <button class="btn-generate" id="addRightBtn" style="margin-top:10px; background:linear-gradient(135deg, #10b981, #047857); padding:12px 0;">
                        添加自己发言
                    </button>
                </div>
                
                <div class="form-group" style="margin-top:40px; padding-top:20px; border-top: 1px solid var(--border);">
                    <button class="btn-generate" id="clearChatBtn" style="background:transparent; border:1px solid rgba(239,68,68,.3); color:#ef4444; box-shadow:none; padding:10px 0;">
                        清空对话记录
                    </button>
                </div>

            </section>

            <!-- ====== 右：预览区 ====== -->
            <section class="preview-panel">
                <h2 class="section-title">
                    <span class="section-icon">☷</span>
                    卡片预览
                </h2>

                <div class="preview-area" id="previewArea">
                    <div id="cardWrapper" class="card-wrapper" style="width: 375px; max-width:100%;">
                        <div id="shareCard" class="share-card wechat-card">
                            <!-- 微信头部 -->
                            <div class="wechat-header">
                                <div class="wechat-header-left">
                                    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                                </div>
                                <div class="wechat-header-title" id="displayTargetName">一只甜薯</div>
                                <div class="wechat-header-right">
                                    <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="5" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="19" cy="12" r="1.5" fill="currentColor"/></svg>
                                </div>
                            </div>
                            
                            <!-- 聊天记录区域 -->
                            <div class="wechat-body" id="chatList">
                                <!-- 空白状态提醒 -->
                                <div class="chat-empty-hint" id="chatEmptyHint" style="text-align:center; color:#999; font-size:0.85rem; padding: 40px 0;">
                                    在左侧输入内容并添加即可生成对话
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="preview-actions" id="previewActions">
                    <div class="preview-btns">
                        <button class="btn-save" id="saveBtn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                            保存图片
                        </button>
                        <button class="btn-save" id="copyBtn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                            </svg>
                            复制剪贴板
                        </button>
                    </div>
                    <span class="save-hint">保存或复制到剪贴板后可直接粘贴分享</span>
                </div>
            </section>
        </main>
    </div>

    <!-- 隐藏的头像存储，用于生成同一对象时的稳定头像 -->
    <div id="hiddenAvatars" style="display:none;"></div>

    <script src="../static/chat.js"></script>
</body>
</html>
