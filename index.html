<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>网站已关闭</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      display: grid;
      place-items: center;
      background: #ffffff;
      font-family: 'Noto Sans SC', 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 2rem;
      opacity: 0;
      transform: translateY(10px);
      animation: up .9s cubic-bezier(.22,1,.36,1) .2s forwards;
    }

    .tag {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 1.6rem;
    }

    h1 {
      font-size: clamp(2.4rem, 8vw, 4.5rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: #111;
      margin-bottom: 2rem;
    }

    h1 span {
      display: block;
      color: #ccc;
    }

    .bar {
      width: 32px;
      height: 2px;
      background: #111;
      margin-bottom: 2rem;
    }

    p {
      font-size: 0.9rem;
      font-weight: 300;
      line-height: 1.9;
      color: #888;
      max-width: 280px;
    }

    @keyframes up {
      to { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="tag">Site Closed</p>
    <h1>感谢<br/>陪伴<span>再见。</span></h1>
    <div class="bar"></div>
    <p>此网站已停止运营。<br/>感谢每一位曾经到来的你。</p>
  </div>
</body>
</html>
